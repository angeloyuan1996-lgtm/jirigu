      window.SDK_OPTIONS = {
        gameId: "nhmbbl0lv98kuf7w2sr5das20vkz3lkd",
        onEvent: function(a) {
          switch(a.name) {
            case "SDK_GAME_PAUSE":
              window.dispatchEvent(new CustomEvent('gm-ad-pause'));
              break;
            case "SDK_GAME_START":
              window.dispatchEvent(new CustomEvent('gm-ad-resume'));
              break;
            case "SDK_READY":
              console.log('[GameMonetize] SDK Ready');
              break;
            case "SDK_ERROR":
              console.error('[GameMonetize] SDK Error');
              break;
          }
        }
      };
    </script>
